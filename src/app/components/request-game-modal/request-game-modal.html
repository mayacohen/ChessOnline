<div class="modal">
    <div class="modal-content">
        <button class="close-btn" (click)="closeModal()">&times;</button>
        <h3>Rueqest Game</h3>
        @for (user of activeUsers; track user)
        {
            <app-player-details-for-game [user]="user">
            </app-player-details-for-game>
        }
        @empty
        {
            <h3>No one is online right now</h3>
        }
    </div>
</div>
