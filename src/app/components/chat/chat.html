<div class="modal" (click)="closeModal()">
    <div class="modal-content-chat" (click)="unexpectedEventsHandler($event)">
        <button class="closeButton" (click)="closeModal()">&times;</button>
        <div class="user-messaging">
            <h3>{{usernameCommunicatingWith}}</h3>
            <img src='imgUserCommunicatingWith'/>
        </div>
        <div class="messageContainer">
            @for(message of messages; track message)
            {
                <div 
                [ngClass]="message.fromUserName === userName? 'sent-messages' : 
                'recieved-messages'">{{message.content}}
                <p>{{message.messegeDate}}</p>
                </div>
            }
        </div>
        <div class="send-new-message-container">
            <input type="text" placeholder="Message" [(ngModel)]="newMessageContent"/>
            <button class="sendButton">
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
</div>
