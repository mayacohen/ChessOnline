<div class="layout">
    <div class="board">
        <!-- do something for alt? -->
        <!-- <app-player-details-for-game 
            [user] = 'opponent'
        ></app-player-details-for-game> -->
        <div class="container">
            @for (row of board; track row; let i = $index)
            {
                @for (sq of row; track sq; let j = $index)
                {
                    <div [id]='board[i][j]'  
                    [ngClass]="getTileClass(i,j)" (click)="onSquareClick(id)">
                    </div>
                }
            }
            if (isWhitePlayer !== isWhiteTurn)
            {
                <div id="hourglassModal">
                    <img src="hourglass-svg" class="spin" alt='https://dryicons.com/free-icons/hourglass'>
                </div>
            }
        </div>
        <!-- <app-player-details-for-game 
            [user] = 'player'
        ></app-player-details-for-game> -->
    </div>
    <app-game-tracker></app-game-tracker>
</div>
